<script>
  // ── Stars ──
  (function() {
    const wrap = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%; top:${Math.random()*100}%;
        --d:${(Math.random()*3+2).toFixed(1)}s;
        --delay:${(Math.random()*4).toFixed(1)}s;
        --op:${(Math.random()*0.5+0.3).toFixed(2)};
      `;
      wrap.appendChild(s);
    }
  })();

  // ── Questions ──
  // 依據研究：心理年齡由 好奇心/開放性、社交品質、情緒調節、身體感知、變化適應力、生活掌控感 決定
  // 評分：A=0（心理較年輕）/ B=1 / C=2 / D=3（心理較年長）
  // 總分 0–30，均勻分布
  const questions = [
    {
      // 維度：好奇心與開放性（研究顯示好奇心高者主觀年齡顯著較低）
      text: '你上次主動去學一件「完全不熟的新事物」是什麼時候？',
      hint: '例如新語言、新軟體、新樂器，工作必要的不算',
      options: [
        { label: '最近就有，我很喜歡嘗試新東西', score: 0 },
        { label: '幾個月前，後來沒繼續', score: 1 },
        { label: '說真的，好幾年前了', score: 2 },
        { label: '我學那麼多幹嘛，會用的就夠了', score: 3 },
      ]
    },
    {
      // 維度：社交品質（高品質社交是心理年齡年輕的核心指標）
      text: '上週你跟朋友的互動，大概是什麼狀態？',
      hint: '「朋友」是指你主動聯繫或見面的人，不是家人',
      options: [
        { label: '有見面或深聊，感覺充電了', score: 0 },
        { label: '有傳訊息，但沒有深入聊', score: 1 },
        { label: '看了對方限時動態，沒有聯絡', score: 2 },
        { label: '沒有，那個圈子久了就散了', score: 3 },
      ]
    },
    {
      // 維度：情緒調節（情緒彈性與恢復速度是主觀年齡的關鍵預測因子）
      text: '你遇到一個讓你煩的事，通常多久能恢復正常？',
      hint: '指心情真的平靜下來，不是壓下去',
      options: [
        { label: '當天消化掉，隔天就好了', score: 0 },
        { label: '幾天，轉移注意力才行', score: 1 },
        { label: '要很久，我不太會放下', score: 2 },
        { label: '很多事我選擇不去感覺了', score: 3 },
      ]
    },
    {
      // 維度：開放性格（對新觀點的接受度與心理年齡密切相關）
      text: '有人跟你說「你這個觀念是錯的」，你的第一反應？',
      hint: '假設對方是認真的，不是在吵架',
      options: [
        { label: '有可能耶，我願意聽聽看', score: 0 },
        { label: '先抗拒，但事後可能想一想', score: 1 },
        { label: '我通常覺得自己的方式沒問題', score: 2 },
        { label: '活這麼久了，我的判斷不會錯', score: 3 },
      ]
    },
    {
      // 維度：身體感知（身體疲勞感與自覺健康是主觀年齡的直接指標）
      text: '你對自己「身體狀態」的感受，最接近哪一個？',
      hint: '誠實回答，不要比較別人',
      options: [
        { label: '整體還不錯，精力算充足', score: 0 },
        { label: '還可以，偶爾覺得累', score: 1 },
        { label: '容易累，很多事提不起勁', score: 2 },
        { label: '身體常常在抗議，有些事不做了', score: 3 },
      ]
    },
    {
      // 維度：變化適應力（能否適應環境變化是心理成熟感的核心）
      text: '你的生活突然需要做一個「大改變」，你的態度比較像？',
      hint: '例如換工作、搬家、改變習慣',
      options: [
        { label: '有點緊張，但我會去試', score: 0 },
        { label: '需要時間，慢慢來還是可以', score: 1 },
        { label: '很抗拒，穩定對我比較重要', score: 2 },
        { label: '不要改了，改了也不見得更好', score: 3 },
      ]
    },
    {
      // 維度：生活掌控感（主動感vs被動感與主觀年齡高度相關）
      text: '你覺得自己的生活，是「你在推」還是「被推著走」？',
      hint: '工作、關係、健康都算在內',
      options: [
        { label: '大部分是我在決定方向', score: 0 },
        { label: '一半一半，有些失控', score: 1 },
        { label: '很多事都是配合別人或環境', score: 2 },
        { label: '說不清楚，時間就這樣過了', score: 3 },
      ]
    },
    {
      // 維度：好奇心（對世界的興趣感是維持年輕感的關鍵）
      text: '隨便一個你沒聽過的話題，你的反應比較接近？',
      hint: '例如朋友突然聊一個你完全不懂的事',
      options: [
        { label: '來來來，講給我聽', score: 0 },
        { label: '可以聽，但興趣沒很大', score: 1 },
        { label: '聽了也不會記，所以懶得聽', score: 2 },
        { label: '跟我有什麼關係', score: 3 },
      ]
    },
    {
      // 維度：社交孤獨感（孤獨感加速心理老化，有研究支持）
      text: '你有「能說真心話」的人嗎？',
      hint: '能說的意思是說了對方真的會聽，不是敷衍你',
      options: [
        { label: '有，不只一個', score: 0 },
        { label: '有一個，但不常聊', score: 1 },
        { label: '說不太確定，好像有又好像沒有', score: 2 },
        { label: '沒有，什麼話都是自己消化', score: 3 },
      ]
    },
    {
      // 維度：對未來的態度（對未來的期待感是主觀年齡年輕的標誌）
      text: '提到「三年後的你」，你的直覺反應是？',
      hint: '第一個浮現的感覺是什麼',
      options: [
        { label: '有點期待，我有想做的事', score: 0 },
        { label: '不確定，但應該還好', score: 1 },
        { label: '不想太多，過好現在就好', score: 2 },
        { label: '想也沒用，又不知道會發生什麼', score: 3 },
      ]
    },
  ];

  const results = [
    {
      // age 12–23 → total 0–5
      min: 0, max: 5,
      image: 'img_forever18.png',
      title: '活力充沛型',
      desc: '好奇心旺盛，對新事物來者不拒。社交圈活躍、情緒恢復得快、對未來有明確的期待。你的內在節奏比多數人快，停下來對你來說反而不自在。',
      scores: { curiosity: 90, social: 88, emotion: 85, body: 80, adaptable: 92 }
    },
    {
      // age 24–33 → total 6–10
      min: 6, max: 10,
      image: 'img_wavering.png',
      title: '輕熟搖擺型',
      desc: '大部分狀態還不錯，但有些地方開始有點卡住了。好奇心還在，行動力少了一點。社交還有，但主動性降了。你正站在一個往哪裡走都可以的位置上。',
      scores: { curiosity: 65, social: 60, emotion: 62, body: 58, adaptable: 68 }
    },
    {
      // age 34–48 → total 11–17
      min: 11, max: 17,
      image: 'img_midage.png',
      title: '穩定固化型',
      desc: '你很清楚自己要什麼、不要什麼。習慣固定、生活穩定、對變化沒太大興趣。你的世界運轉得很順，但也很少出現意料之外的事。',
      scores: { curiosity: 42, social: 45, emotion: 50, body: 48, adaptable: 38 }
    },
    {
      // age 49–62 → total 18–24
      min: 18, max: 24,
      image: 'img_tea.png',
      title: '內斂沉澱型',
      desc: '你的社交圈小但夠用，情緒習慣自己處理，對外在世界的興趣不算高。生活節奏慢，內在世界安靜。你不太需要別人來定義你的狀態。',
      scores: { curiosity: 28, social: 25, emotion: 35, body: 38, adaptable: 22 }
    },
    {
      // age 63–75 → total 25–30
      min: 25, max: 30,
      image: 'img_warranty.png',
      title: '沉穩老靈魂型',
      desc: '你對世界的態度是「看過了」。不太好奇、不太社交、不太想變。你的生活像一本早就翻完的書，現在只是偶爾回去看幾頁喜歡的段落。',
      scores: { curiosity: 12, social: 15, emotion: 20, body: 25, adaptable: 10 }
    },
  ];



  let currentQ = 0;
  let answers = new Array(questions.length).fill(null);

  function startQuiz() {
    showScreen('quiz');
    renderQuestion(0);
  }

  function renderQuestion(idx) {
    const q = questions[idx];
    currentQ = idx;

    document.getElementById('q-count').textContent = `第 ${idx + 1} 題，共 ${questions.length} 題`;
    const pct = Math.round((idx / questions.length) * 100);
    document.getElementById('q-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('q-num').textContent = `QUESTION ${String(idx + 1).padStart(2, '0')}`;
    document.getElementById('q-text').textContent = q.text;
    document.getElementById('q-hint').textContent = q.hint;

    const wrap = document.getElementById('options-wrap');
    wrap.innerHTML = '';

    const labels = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[idx] === oi ? ' selected' : '');
      btn.innerHTML = `<span class="opt-label">${labels[oi]}</span><span>${opt.label}</span>`;
      btn.onclick = () => selectOption(oi);
      wrap.appendChild(btn);
    });

    document.getElementById('btn-prev').disabled = idx === 0;
    updateNextBtn();

    // animate card
    const card = document.getElementById('question-card');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'fadeUp 0.35s ease';
  }

  function selectOption(oi) {
    answers[currentQ] = oi;
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      btn.classList.toggle('selected', i === oi);
    });
    updateNextBtn();
  }

  function updateNextBtn() {
    const btn = document.getElementById('btn-next');
    const isLast = currentQ === questions.length - 1;
    btn.disabled = answers[currentQ] === null;
    btn.textContent = isLast ? '看結果 ✨' : '下一題 →';
  }

  function nextQ() {
    if (answers[currentQ] === null) return;
    if (currentQ < questions.length - 1) {
      renderQuestion(currentQ + 1);
    } else {
      showResult();
    }
  }

  function prevQ() {
    if (currentQ > 0) renderQuestion(currentQ - 1);
  }

  function showResult() {
    // calculate score
    let total = 0;
    answers.forEach((ai, qi) => {
      if (ai !== null) total += questions[qi].options[ai].score;
    });

    // map to age
    const minScore = 0, maxScore = questions.length * 3;
    const minAge = 12, maxAge = 75;
    const pct = total / maxScore;
    const age = Math.round(minAge + pct * (maxAge - minAge));

    const res = results.find(r => total >= r.min && total <= r.max) || results[results.length - 1];

    document.getElementById('res-age').textContent = age;
    document.getElementById('res-title').textContent = res.title;
    document.getElementById('res-desc').textContent = res.desc;

    // 插圖
    const heroImg = document.getElementById('result-hero-img');
    if (heroImg && res.image) {
      heroImg.src = res.image;
      heroImg.alt = res.title;
    }

    // 雷達圖
    showScreen('result');
    setTimeout(() => drawRadar(res.scores), 50);

    // update progress to 100%
    document.getElementById('progress-fill').style.width = '100%';
    setTimeout(launchConfetti, 300);
  }

  function drawRadar(scores) {
    const canvas = document.getElementById('radar-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const R = Math.min(W, H) * 0.34;
    const labels = ['好奇心', '社交品質', '情緒彈性', '體力感受', '適應力'];
    const vals = [scores.curiosity, scores.social, scores.emotion, scores.body, scores.adaptable];
    const n = labels.length;
    const accent = '#a78bfa', accent2 = '#60a5fa';

    ctx.clearRect(0, 0, W, H);

    // Grid rings
    [0.33, 0.66, 1].forEach(ratio => {
      ctx.beginPath();
      for (let i = 0; i < n; i++) {
        const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
        const x = cx + R * ratio * Math.cos(ang);
        const y = cy + R * ratio * Math.sin(ang);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = 'rgba(167,139,250,0.18)';
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    // Axis lines
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + R * Math.cos(ang), cy + R * Math.sin(ang));
      ctx.strokeStyle = 'rgba(167,139,250,0.22)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Data polygon fill
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
      const ratio = vals[i] / 100;
      const x = cx + R * ratio * Math.cos(ang);
      const y = cy + R * ratio * Math.sin(ang);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    grad.addColorStop(0, 'rgba(167,139,250,0.45)');
    grad.addColorStop(1, 'rgba(96,165,250,0.25)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = accent;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Dots
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
      const ratio = vals[i] / 100;
      const x = cx + R * ratio * Math.cos(ang);
      const y = cy + R * ratio * Math.sin(ang);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = accent;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Labels
    ctx.font = 'bold 13px Noto Sans TC, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
      const labelR = R + 32;
      const x = cx + labelR * Math.cos(ang);
      const y = cy + labelR * Math.sin(ang);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText(labels[i], x, y);
    }
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetQuiz() {
    answers = new Array(questions.length).fill(null);
    currentQ = 0;
    showScreen('intro');
  }

  function captureResultCard() {
    return new Promise((resolve) => {
      const age = document.getElementById('res-age').textContent;
      const title = document.getElementById('res-title').textContent;
      const desc = document.getElementById('res-desc').textContent;
      const heroImg = document.getElementById('result-hero-img');
      const res = results.find(r => r.image === heroImg.src.split('/').pop()) || results[0];
      // 找到當前結果
      let total = 0;
      answers.forEach((ai, qi) => { if (ai !== null) total += questions[qi].options[ai].score; });
      const currentRes = results.find(r => total >= r.min && total <= r.max) || results[results.length - 1];

      const W = 720, H = 1280;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // 背景
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#0d0d1a');
      bgGrad.addColorStop(0.5, '#151530');
      bgGrad.addColorStop(1, '#0d0d1a');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // 載入圖片後繪製
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        // Hero 圖片區（裁切到固定高度）
        const heroH = 400;
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, W, heroH);
        ctx.clip();

        // 圖片填滿（cover 效果）
        const imgRatio = img.width / img.height;
        const areaRatio = W / heroH;
        let drawW, drawH, offsetX = 0, offsetY = 0;
        if (imgRatio > areaRatio) {
          drawH = heroH;
          drawW = heroH * imgRatio;
          offsetX = (W - drawW) / 2;
        } else {
          drawW = W;
          drawH = W / imgRatio;
          offsetY = (heroH - drawH) / 2;
        }
        ctx.globalAlpha = 0.6;
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
        ctx.globalAlpha = 1;

        // 遮罩
        const overlay = ctx.createLinearGradient(0, 0, 0, heroH);
        overlay.addColorStop(0, 'rgba(13,13,26,0.3)');
        overlay.addColorStop(1, 'rgba(13,13,26,0.85)');
        ctx.fillStyle = overlay;
        ctx.fillRect(0, 0, W, heroH);
        ctx.restore();

        // 「你的心理年齡」標籤
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 22px "Noto Sans TC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('你的心理年齡', W / 2, 120);

        // 年齡數字
        ctx.font = '900 140px "Noto Sans TC", sans-serif';
        ctx.fillStyle = '#e8d5ff';
        ctx.fillText(age, W / 2, 280);

        // 「歲」
        ctx.font = '900 36px "Noto Sans TC", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText('歲', W / 2, 330);

        // 分隔線
        const lineY = 420;
        const lineGrad = ctx.createLinearGradient(60, lineY, W - 60, lineY);
        lineGrad.addColorStop(0, 'transparent');
        lineGrad.addColorStop(0.5, 'rgba(167,139,250,0.4)');
        lineGrad.addColorStop(1, 'transparent');
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(60, lineY); ctx.lineTo(W - 60, lineY); ctx.stroke();

        // 標題
        ctx.fillStyle = '#fff';
        ctx.font = '900 36px "Noto Sans TC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(title, W / 2, 480);

        // 描述（自動換行）
        ctx.font = '400 22px "Noto Sans TC", sans-serif';
        ctx.fillStyle = '#ccc';
        ctx.textAlign = 'left';
        const maxW = W - 120;
        let words = desc;
        let line = '';
        let dy = 530;
        for (let i = 0; i < words.length; i++) {
          const testLine = line + words[i];
          if (ctx.measureText(testLine).width > maxW) {
            ctx.fillText(line, 60, dy);
            line = words[i];
            dy += 34;
          } else {
            line = testLine;
          }
        }
        ctx.fillText(line, 60, dy);

        // 雷達圖
        const scores = currentRes.scores;
        const labels = ['好奇心', '社交品質', '情緒彈性', '體力感受', '適應力'];
        const vals = [scores.curiosity, scores.social, scores.emotion, scores.body, scores.adaptable];
        const n = 5;
        const cx = W / 2, cy = 880, R = 150;

        // 網格
        [0.33, 0.66, 1].forEach(ratio => {
          ctx.beginPath();
          for (let i = 0; i < n; i++) {
            const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
            const x = cx + R * ratio * Math.cos(ang);
            const y = cy + R * ratio * Math.sin(ang);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.strokeStyle = 'rgba(167,139,250,0.2)';
          ctx.lineWidth = 1;
          ctx.stroke();
        });

        // 軸線
        for (let i = 0; i < n; i++) {
          const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + R * Math.cos(ang), cy + R * Math.sin(ang));
          ctx.strokeStyle = 'rgba(167,139,250,0.2)';
          ctx.stroke();
        }

        // 資料多邊形
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
          const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
          const r = (vals[i] / 100) * R;
          const x = cx + r * Math.cos(ang);
          const y = cy + r * Math.sin(ang);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
        grad.addColorStop(0, 'rgba(167,139,250,0.45)');
        grad.addColorStop(1, 'rgba(96,165,250,0.25)');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = '#a78bfa';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // 節點
        for (let i = 0; i < n; i++) {
          const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
          const r = (vals[i] / 100) * R;
          ctx.beginPath();
          ctx.arc(cx + r * Math.cos(ang), cy + r * Math.sin(ang), 5, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
          ctx.strokeStyle = '#a78bfa';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // 標籤
        ctx.font = 'bold 18px "Noto Sans TC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        for (let i = 0; i < n; i++) {
          const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
          const lr = R + 40;
          ctx.fillText(labels[i], cx + lr * Math.cos(ang), cy + lr * Math.sin(ang) + 6);
        }

        // Hashtag 底部
        ctx.textAlign = 'center';
        ctx.font = '400 20px "Noto Sans TC", sans-serif';
        ctx.fillStyle = 'rgba(167,139,250,0.7)';
        ctx.fillText('#你幾歲的心理年齡', W / 2, H - 60);
        ctx.font = '400 16px "Noto Sans TC", sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText(window.location.href, W / 2, H - 30);

        resolve(canvas);
      };
      img.onerror = () => {
        // 圖片載入失敗也要 resolve
        ctx.fillStyle = '#fff';
        ctx.font = '900 140px "Noto Sans TC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(age, W / 2, 280);
        resolve(canvas);
      };
      img.src = heroImg.src;
    });
  }


  async function shareTo(platform) {
    const url = window.location.href;
    const age = document.getElementById('res-age').textContent;
    const title = document.getElementById('res-title').textContent;
    const text = `我的心理年齡是 ${age} 歲（${title}）！你呢？來測測看 👉`;

    if (platform === 'copy') {
      navigator.clipboard.writeText(text + ' ' + url).then(() => {
        const btn = document.querySelector('.share-copy');
        const orig = btn.innerHTML;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        btn.style.borderColor = '#06C755';
        setTimeout(() => { btn.innerHTML = orig; btn.style.borderColor = ''; }, 2000);
      });
      return;
    }

    // 下載結果圖
    try {
      const canvas = await captureResultCard();
      const link = document.createElement('a');
      link.download = 'my-mental-age.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {}

    showShareToast(platform === 'ig'
      ? '📸 圖片已下載、文字已複製！請到 IG 限動或貼文手動貼上'
      : '📸 結果圖已下載！分享時請手動貼上圖片');

    setTimeout(() => {
      const fullText = encodeURIComponent(text + ' ' + url);
      switch (platform) {
        case 'line':
          // line.me/R/share 會優先開 LINE APP
          window.open(`https://line.me/R/share?text=${fullText}`, '_blank');
          break;
        case 'ig':
          navigator.clipboard.writeText(text + ' ' + url).catch(() => {});
          // 嘗試開 IG APP，失敗則開網頁
          window.location.href = 'instagram://';
          setTimeout(() => { window.open('https://www.instagram.com/', '_blank'); }, 1500);
          break;
        case 'threads':
          window.open(`https://www.threads.net/intent/post?text=${fullText}`, '_blank');
          break;
        case 'x':
          window.open(`https://x.com/intent/post?text=${fullText}`, '_blank');
          break;
      }
    }, 800);
  }

  function showShareToast(msg) {
    let toast = document.getElementById('share-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'share-toast';
      toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(13,13,26,0.95);border:1px solid rgba(167,139,250,0.3);color:#fff;padding:14px 24px;border-radius:16px;font-size:14px;z-index:9999;opacity:0;transition:all 0.3s;backdrop-filter:blur(12px);text-align:center;max-width:320px;';
      document.body.appendChild(toast);
    }
    toast.textContent = msg || '📸 結果圖已下載！分享時請手動貼上圖片';
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(20px)';
    }, 4000);
  }

  async function saveResultImage() {
    const btn = document.querySelector('.share-save');
    const origHTML = btn.innerHTML;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> 產生中...';
    btn.disabled = true;

    try {
      const canvas = await captureResultCard();
      const link = document.createElement('a');
      link.download = 'my-mental-age.png';
      link.href = canvas.toDataURL('image/png');
      link.click();

      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> 已儲存！';
      btn.style.borderColor = '#06C755';
      setTimeout(() => { btn.innerHTML = origHTML; btn.style.borderColor = ''; btn.disabled = false; }, 2000);
    } catch (e) {
      btn.innerHTML = origHTML;
      btn.disabled = false;
      alert('截圖失敗，請手動截圖分享');
    }
  }


  function launchConfetti() {
    const wrap = document.getElementById('confetti');
    wrap.innerHTML = '';
    const colors = ['#a78bfa','#60a5fa','#f472b6','#fbbf24','#34d399'];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        --dur: ${(Math.random() * 1.5 + 2).toFixed(1)}s;
        --delay: ${(Math.random() * 1.2).toFixed(2)}s;
        --tx: ${(Math.random() * 120 - 60).toFixed(0)}px;
        transform: rotate(${Math.random() * 360}deg);
      `;
      wrap.appendChild(p);
    }
    setTimeout(() => { wrap.innerHTML = ''; }, 4000);
  }

  // ── 廣告側邊欄初始化 ──
  (function initAdSidebar() {
    const sidebar = document.getElementById('ad-sidebar');
    const toggle  = document.getElementById('ad-toggle');
    if (!sidebar || !toggle) return;
    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      sidebar.classList.toggle('open');
    });
    document.addEventListener('click', function(e) {
      if (!sidebar.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    });
  })();

  // ── Firebase 計數器 ──
  (function initCounter() {
    const db = window.__firestore;
    if (!db) return;
    const counterRef = db.collection('counters').doc('mental-age');
    counterRef.update({
      views: firebase.firestore.FieldValue.increment(1)
    }).catch(function() {
      return counterRef.set({ views: 1 });
    }).then(function() {
      return counterRef.get();
    }).then(function(doc) {
      if (doc && doc.exists) {
        const num = doc.data().views;
        document.getElementById('counter-num').textContent = num.toLocaleString();
        document.getElementById('counter-wrap').style.display = 'block';
      }
    }).catch(function(err) {
      console.error('Counter error:', err);
    });
  })();
</script>
